[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

remappings = [
    "v4-core/=lib/v4-core/",
    "forge-std/=lib/forge-std/src/",
    "solmate/=lib/v4-core/lib/solmate/",
    "openzeppelin-contracts/=lib/v4-core/lib/openzeppelin-contracts/"
]

[rpc_endpoints]
xlayer_testnet = "https://testrpc.xlayer.tech"
xlayer_mainnet = "https://rpc.xlayer.tech"
